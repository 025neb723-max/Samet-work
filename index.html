<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nepal Survey Dashboard — Top 50 Preferences</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <h1 class="logo">🇳🇵 Nepal Survey Dashboard</h1>
      <p class="subtitle">Large-Scale Survey &middot; Top 50 Preferred &amp; Not Preferable Things</p>
    </div>
  </header>

  <!-- Stats Bar -->
  <section class="stats-bar" id="stats-bar">
    <!-- Populated by JS -->
  </section>

  <!-- Controls -->
  <section class="container controls">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search items..." aria-label="Search items">
    </div>
    <div class="filter-group">
      <label for="category-filter">Category:</label>
      <select id="category-filter" aria-label="Filter by category">
        <option value="all">All Categories</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="trend-filter">Trend:</label>
      <select id="trend-filter" aria-label="Filter by trend">
        <option value="all">All Trends</option>
        <option value="up">↑ Trending Up</option>
        <option value="down">↓ Trending Down</option>
        <option value="stable">→ Stable</option>
      </select>
    </div>
  </section>

  <!-- Tab Navigation -->
  <section class="container">
    <div class="tabs" role="tablist">
      <button class="tab active" role="tab" aria-selected="true" data-tab="preferred" id="tab-preferred">
        👍 Top 50 Preferred
      </button>
      <button class="tab" role="tab" aria-selected="false" data-tab="not-preferable" id="tab-not-preferable">
        👎 Top 50 Not Preferable
      </button>
    </div>
  </section>

  <!-- Chart Section -->
  <section class="container">
    <div class="chart-section">
      <h2 id="chart-title" class="section-title">Top 10 Preferred — Score Overview</h2>
      <div class="chart" id="bar-chart" role="img" aria-label="Bar chart showing top 10 items by score">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- Table Section -->
  <section class="container">
    <div class="table-section">
      <h2 id="table-title" class="section-title">All 50 Preferred Items</h2>
      <div class="table-wrapper">
        <table id="data-table" aria-label="Survey results table">
          <thead>
            <tr>
              <th class="sortable" data-sort="rank">Rank</th>
              <th class="sortable" data-sort="name">Name</th>
              <th class="sortable" data-sort="category">Category</th>
              <th class="sortable" data-sort="score">Score</th>
              <th class="sortable" data-sort="votes">Votes</th>
              <th class="sortable" data-sort="trend">Trend</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
      <p class="showing-count" id="showing-count"></p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>Nepal Survey Dashboard &copy; 2026 &middot; Data from large-scale nationwide survey</p>
      <p class="footer-note" id="footer-note"></p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
